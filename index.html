var APP = document.getElementById('gbd-bi-app');

function gbdScrollTop() {
  // Scroll the Canvas page content area, or fallback to window
  var canvasContent = document.getElementById('content') || document.querySelector('.ic-Layout-contentMain') || document.querySelector('main');
  if (canvasContent) {
    canvasContent.scrollTop = 0;
    canvasContent.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } else {
    window.scrollTo(0, 0);
  }
  APP.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function gbdBuildFlow() {
  var pipeline = document.getElementById('gbd-pipeline');
  pipeline.innerHTML = '';
  var delay = 0;

  var startPill = document.createElement('div');
  startPill.className = 'gbd-pill start';
  startPill.textContent = 'início';
  startPill.style.animationDelay = delay + 's';
  pipeline.appendChild(startPill);
  delay += 0.06;

  aulas.forEach(function(aula, i) {
    var conn = document.createElement('div');
    conn.className = 'gbd-connector';
    conn.style.animationDelay = delay + 's';
    pipeline.appendChild(conn);
    delay += 0.04;

    if (aula.phase) {
      var ph = document.createElement('div');
      ph.className = 'gbd-phase-label';
      ph.textContent = aula.phase;
      ph.style.animationDelay = delay + 's';
      pipeline.appendChild(ph);
      delay += 0.04;
    }

    var node = document.createElement('div');
    node.className = 'gbd-node' + (i === 7 ? ' final' : '');
    node.style.animationDelay = delay + 's';
    node.innerHTML =
      '<div class="gbd-node-num">' + aula.num + '</div>' +
      '<div class="gbd-node-text">' +
        '<div class="gbd-node-title">' + aula.title + '</div>' +
        '<div class="gbd-node-sub">' + aula.sub + '</div>' +
      '</div>' +
      '<div class="gbd-node-arrow">→</div>';
    (function(idx){ node.addEventListener('click', function(){ gbdShowDetail(idx); }); })(i);
    pipeline.appendChild(node);
    delay += 0.06;
  });

  var conn2 = document.createElement('div');
  conn2.className = 'gbd-connector';
  conn2.style.animationDelay = delay + 's';
  pipeline.appendChild(conn2);

  var endPill = document.createElement('div');
  endPill.className = 'gbd-pill end';
  endPill.textContent = 'fim';
  endPill.style.animationDelay = (delay + 0.04) + 's';
  pipeline.appendChild(endPill);
}

function gbdShowDetail(idx) {
  var aula = aulas[idx];
  var hero = document.getElementById('gbd-detail-hero');
  var body = document.getElementById('gbd-detail-body');

  hero.setAttribute('data-num', aula.num);
  hero.innerHTML =
    '<div class="gbd-detail-eyebrow">Aula ' + aula.num + ' · ' + aula.sub + '</div>' +
    '<h1 class="gbd-detail-title">' + aula.title + '</h1>' +
    '<p class="gbd-detail-tagline">' + aula.tagline + '</p>';

  var html = '';
  aula.sections.forEach(function(sec, si) {
    html += '<div class="gbd-detail-section" style="animation-delay:' + (.05 + si * .07) + 's">';
    html += '<div class="gbd-section-label">' + sec.label + '</div>';
    if (sec.quote) html += '<div class="gbd-detail-quote">' + sec.quote + '</div>';
    if (sec.text)  html += '<p class="gbd-section-text">' + sec.text + '</p>';
    if (sec.pillars) {
      html += '<div class="gbd-pillars">';
      sec.pillars.forEach(function(p) {
        html += '<div class="gbd-pillar-card"><strong>' + p.title + '</strong><p>' + p.body + '</p></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  var prev = idx > 0 ? aulas[idx - 1] : null;
  var next = idx < aulas.length - 1 ? aulas[idx + 1] : null;
  html += '<div class="gbd-detail-nav">' +
    '<button class="gbd-nav-btn prev" onclick="gbdShowDetail(' + (idx - 1) + ')" ' + (!prev ? 'disabled' : '') + '>' +
      '← Anterior<span>' + (prev ? prev.title : '') + '</span>' +
    '</button>' +
    '<button class="gbd-nav-btn next" onclick="gbdShowDetail(' + (idx + 1) + ')" ' + (!next ? 'disabled' : '') + '>' +
      'Próxima →<span>' + (next ? next.title : '') + '</span>' +
    '</button>' +
  '</div>';

  body.innerHTML = html;

  document.getElementById('gbd-flow-screen').classList.remove('active');
  document.getElementById('gbd-detail-screen').classList.add('active');
  gbdScrollTop();
}

function gbdShowFlow() {
  document.getElementById('gbd-detail-screen').classList.remove('active');
  document.getElementById('gbd-flow-screen').classList.add('active');
  gbdScrollTop();
}

// Expose navigation functions globally so onclick attributes work
window.gbdShowDetail = gbdShowDetail;
window.gbdShowFlow = gbdShowFlow;

gbdBuildFlow();

})();
</script>
